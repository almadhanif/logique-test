# Logique Motors — the used-car app only.
#
# HTTPS / reverse-proxy is handled by the shared `solvara-proxy` project (the
# single service that binds 80/443). This stack just runs the app and attaches
# it to the external `web` network so the proxy can reach it as `logique-motors`.
#
# Secrets (OPENROUTER_API_KEY, ADMIN_PASSWORD) are read from the `.env` file
# that docker compose auto-loads; DATABASE_URL is fixed to the persisted volume.

services:
  app:
    build: .
    image: logique-motors:latest
    container_name: logique-motors
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # SQLite file on a persisted named volume (survives restarts/redeploys).
      DATABASE_URL: "file:/app/data/dev.db"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-https://localhost}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      # Optional: override the OpenRouter model (defaults to openai/gpt-4o-mini).
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
    volumes:
      - db-data:/app/data
    expose:
      - "3000"
    networks:
      - web

networks:
  web:
    external: true

volumes:
  db-data:
